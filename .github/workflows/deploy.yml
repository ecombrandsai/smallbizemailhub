name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Publish to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4
      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: smallbizemailhub
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Ping search engines with updated sitemap
        run: |
          curl -fsS "https://www.google.com/ping?sitemap=https://smallbizemailhub.com/sitemap.xml" || true
          curl -fsS "https://www.bing.com/ping?sitemap=https://smallbizemailhub.com/sitemap.xml" || true
